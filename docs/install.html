<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>安装 Woclaw</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        .cmd {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Consolas', monospace;
            font-size: 1.2em;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .cmd:hover {
            border-color: #4fc3f7;
            transform: scale(1.02);
        }
        .note {
            color: #666;
            font-size: 0.9em;
            margin-top: 30px;
        }
        .star { color: #ffd700; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="star">✨</span> Woclaw 安装 <span class="star">✨</span></h1>
        <p class="subtitle">启明星 AI 助手 - 让 AI 像启明星一样操控你的电脑</p>
        
        <p>在 <strong>PowerShell</strong> 中运行以下命令：</p>
        
        <div class="cmd" onclick="copyCmd()">
            irm https://raw.githubusercontent.com/badhope/Woclaw/main/scripts/install.ps1 | iex
        </div>
        
        <p class="note">
            ⏱️ 安装大约需要 2-5 分钟<br>
            📦 会自动安装 Python、Ollama（可选）和 Woclaw<br>
            🆓 默认使用本地模型，完全免费
        </p>
    </div>
    
    <script>
        function copyCmd() {
            navigator.clipboard.writeText('irm https://raw.githubusercontent.com/badhope/Woclaw/main/scripts/install.ps1 | iex');
            alert('命令已复制！在 PowerShell 中粘贴并运行。');
        }
    </script>
</body>
</html>
